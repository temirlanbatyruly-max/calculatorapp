<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Tip Calculator - Splitter</title>
    <style>
        :root {
            --strong-cyan: #26c0ab;
            --very-dark-cyan: #00494d;
            --dark-grayish-cyan: #5e7a7d;
            --light-grayish-cyan: #c5e4e7;
            --very-light-grayish-cyan: #f4fafa;
            --white: #ffffff;
        }

        body {
            background-color: var(--light-grayish-cyan);
            font-family: 'Space Mono', monospace; /* Похож на шрифт в макете */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        /* --- ГЛАВНАЯ КАРТОЧКА --- */
        .calculator-card {
            background-color: var(--white);
            padding: 32px;
            border-radius: 25px;
            display: grid;
            grid-template-columns: 1fr 1fr; /* Две колонки */
            gap: 40px;
            width: 800px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        h3 {
            color: var(--dark-grayish-cyan);
            font-size: 16px;
            margin-bottom: 10px;
        }

        .input-group { margin-bottom: 30px; }

        .input-field {
            background-color: var(--very-light-grayish-cyan);
            border: none;
            width: 100%;
            padding: 10px 15px;
            border-radius: 5px;
            font-size: 24px;
            color: var(--very-dark-cyan);
            text-align: right;
            box-sizing: border-box;
        }

        .tip-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px;
        }

        .tip-btn {
            background-color: var(--very-dark-cyan);
            color: var(--white);
            border: none;
            padding: 10px;
            font-size: 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: 0.3s;
        }

        .tip-btn.active { background-color: var(--strong-cyan); color: var(--very-dark-cyan); }
        .tip-btn:hover { background-color: var(--light-grayish-cyan); color: var(--very-dark-cyan); }

        .custom-input {
            background-color: var(--very-light-grayish-cyan);
            border: none;
            text-align: center;
            font-size: 20px;
            border-radius: 5px;
            color: var(--very-dark-cyan);
        }

        .result-panel {
            background-color: var(--very-dark-cyan);
            border-radius: 15px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 35px;
        }

        .result-label { color: var(--white); font-size: 14px; }
        .result-label span { color: var(--dark-grayish-cyan); display: block; font-size: 12px; }

        .result-amount {
            color: var(--strong-cyan);
            font-size: 40px;
            margin: 0;
        }

        .reset-btn {
            background-color: var(--strong-cyan);
            border: none;
            padding: 10px;
            width: 100%;
            border-radius: 5px;
            color: var(--very-dark-cyan);
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="calculator-card">
        <div class="inputs">
            <div class="input-group">
                <h3>Bill</h3>
                <input type="text" class="input-field" placeholder="0" value="142.55">
            </div>

            <div class="input-group">
                <h3>Select Tip %</h3>
                <div class="tip-grid">
                    <button class="tip-btn">5%</button>
                    <button class="tip-btn">10%</button>
                    <button class="tip-btn active">15%</button>
                    <button class="tip-btn">25%</button>
                    <button class="tip-btn">50%</button>
                    <input type="text" class="custom-input" placeholder="Custom">
                </div>
            </div>

            <div class="input-group">
                <h3>Number of People</h3>
                <input type="text" class="input-field" placeholder="0" value="5">
            </div>
        </div>

        <div class="result-panel">
            <div class="top-results">
                <div class="result-row">
                    <div class="result-label">Tip Amount <span>/ person</span></div>
                    <p class="result-amount">$4.27</p>
                </div>
                <div class="result-row">
                    <div class="result-label">Total <span>/ person</span></div>
                    <p class="result-amount">$32.79</p>
                </div>
            </div>
            <button class="reset-btn">Reset</button>
        </div>
    </div>

</body>
</html>
